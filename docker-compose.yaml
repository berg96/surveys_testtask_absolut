volumes:
  pg_data:

services:
  postgres_db:
    image: postgres:16
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d surveys"]
      interval: 5s
      retries: 5

  backend:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres_db
      - migrate

  migrate:
    build: .
    command: python manage.py migrate
    env_file:
      - .env
    depends_on:
      - postgres_db
