volumes:
  pg_data:
  static:

services:
  postgres_db:
    image: postgres:16
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d surveys"]
      interval: 5s
      retries: 5

  backend:
    build: .
    env_file:
      - .env
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - static:/app/static_django
    ports:
      - "8000:8000"
    depends_on:
      - postgres_db

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - static:/app/static_django
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
